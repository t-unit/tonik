        - name: value
          in: path
          required: true
          style: matrix
          schema:
            $ref: '#/components/schemas/AllOfSimple'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EchoResponse'

  /matrix/nested/deeply/{value}:
    get:
      operationId: testMatrixDeeplyNested
      tags: [matrix]
      summary: Matrix-style deeply nested object path parameter
      parameters:
        - name: value
          in: path
          required: true
          style: matrix
          schema:
            $ref: '#/components/schemas/DeeplyNestedObject'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EchoResponse'

  /matrix/primitive/integerEnum/{value}:
    get:
      operationId: testMatrixIntegerEnum
      tags: [matrix]
      summary: Matrix-style integer enum path parameter
      parameters:
        - name: value
          in: path
          required: true
          style: matrix
          schema:
            $ref: '#/components/schemas/PriorityEnum'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EchoResponse'

  # =============================================================================
  # LABEL STYLE - MAP PARAMETERS
  # =============================================================================

  /label/map/string/{values}:
    get:
      operationId: testLabelMapString
      tags: [label]
      summary: Label-style map with string values path parameter
      parameters:
        - name: values
          in: path
          required: true
          style: label
          schema:
            type: object
            additionalProperties:
              type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EchoResponse'

  /label/map/integer/{values}:
    get:
      operationId: testLabelMapInteger
      tags: [label]
      summary: Label-style map with integer values path parameter
      parameters:
        - name: values
          in: path
          required: true
          style: label
          schema:
            type: object
            additionalProperties:
              type: integer
      responses:
        '200':
          description: OK
