openapi: 3.0.4
info:
  title: Defaulted Enums API
  description: >-
    Schema with `default` values for enum-typed properties and operation
    parameters.
  version: 1.0.0
  contact:
    name: Example
    url: https://example.com
    email: example@example.com

servers:
  - url: https://api.example.com/v1

paths:
  /subscriptions:
    get:
      operationId: listSubscriptions
      summary: List subscriptions filtered by status
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/Status'
            default: active
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subscription'

components:
  schemas:
    Status:
      type: string
      enum: [active, inactive, archived]
    Tier:
      type: integer
      enum: [1, 2, 3]
    Subscription:
      type: object
      properties:
        # Inline enum with a string default.
        priority:
          type: string
          enum: [low, medium, high]
          default: medium
        # Inline enum with an integer default.
        level:
          type: integer
          enum: [1, 2, 3]
          default: 2
        # $ref to a named string enum with a sibling default — propagates via
        # AliasModel.
        status:
          $ref: '#/components/schemas/Status'
          default: active
        # $ref to a named integer enum with a sibling default — exercises the
        # alias-chain-to-int-enum-with-default path end to end.
        tier:
          $ref: '#/components/schemas/Tier'
          default: 2
        # Default outside the enum's values — must be dropped.
        fallbackPriority:
          type: string
          enum: [low, medium, high]
          default: nonexistent
