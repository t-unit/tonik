components:
  schemas:
    SimpleResult:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        message:
          type: string

    ObjectMethodCollider:
      type: object
      required:
        - runtimeType
        - hashCode
      properties:
        runtimeType:
          type: string
        hashCode:
          type: integer
        noSuchMethod:
          type: string
        toString:
          type: string

    Function:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        arn:
          type: string
        runtime:
          type: string

    function:
      type: object
      properties:
        handler:
          type: string
        timeout:
          type: integer

    Type:
      type: object
      properties:
        name:
          type: string
        kind:
          type: string

    Object:
      type: object
      properties:
        key:
          type: string
        value:
          type: string

    String:
      type: object
      properties:
        content:
          type: string
        encoding:
          type: string

    List:
      type: object
      properties:
        items:
          type: array
          items:
            type: string
        count:
          type: integer

    Map:
      type: object
      properties:
        entries:
          type: object
          additionalProperties:
            type: string

    "Null":
      type: object
      properties:
        reason:
          type: string

    Set:
      type: object
      properties:
        elements:
          type: array
          items:
            type: string

    Future:
      type: object
      properties:
        status:
          type: string
        completedAt:
          type: string
          format: date-time

    Stream:
      type: object
      properties:
        url:
          type: string
        protocol:
          type: string

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
        message:
          type: string
        stackTrace:
          type: string

    Exception:
      type: object
      properties:
        type:
          type: string
        cause:
          type: string

    Iterator:
      type: object
      properties:
        current:
          type: string
        hasNext:
          type: boolean

    Iterable:
      type: object
      properties:
        length:
          type: integer
        isEmpty:
          type: boolean

    Duration:
      type: object
      properties:
        milliseconds:
          type: integer

    DateTime:
      type: object
      properties:
        iso:
          type: string
        epoch:
          type: integer

    Uri:
      type: object
      properties:
        scheme:
          type: string
        host:
          type: string
        path:
          type: string

    RegExp:
      type: object
      properties:
        pattern:
          type: string
        flags:
          type: string

    Enum:
      type: object
      properties:
        index:
          type: integer
        name:
          type: string

    Record:
      type: object
      properties:
        fields:
          type: array
          items:
            type: string

    Symbol:
      type: object
      properties:
        name:
          type: string

    StackTrace:
      type: object
      properties:
        frames:
          type: array
          items:
            type: string

    Comparable:
      type: object
      properties:
        rank:
          type: integer

    Pattern:
      type: object
      properties:
        regex:
          type: string

    int:
      type: object
      properties:
        value:
          type: integer

    double:
      type: object
      properties:
        value:
          type: number

    bool:
      type: object
      properties:
        value:
          type: boolean

    num:
      type: object
      properties:
        value:
          type: number

    dynamic:
      type: object
      properties:
        value:
          type: string

    TypeContainer:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/Type'
        object:
          $ref: '#/components/schemas/Object'
        string:
          $ref: '#/components/schemas/String'
        list:
          $ref: '#/components/schemas/List'
        map:
          $ref: '#/components/schemas/Map'
        nullValue:
          $ref: '#/components/schemas/Null'
        set:
          $ref: '#/components/schemas/Set'
        future:
          $ref: '#/components/schemas/Future'
        stream:
          $ref: '#/components/schemas/Stream'

    DartCoreContainer:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/Error'
        exception:
          $ref: '#/components/schemas/Exception'
        iterator:
          $ref: '#/components/schemas/Iterator'
        iterable:
          $ref: '#/components/schemas/Iterable'
        duration:
          $ref: '#/components/schemas/Duration'
        dateTime:
          $ref: '#/components/schemas/DateTime'
        uri:
          $ref: '#/components/schemas/Uri'
        regExp:
          $ref: '#/components/schemas/RegExp'
        enum:
          $ref: '#/components/schemas/Enum'
        record:
          $ref: '#/components/schemas/Record'
        symbol:
          $ref: '#/components/schemas/Symbol'
        stackTrace:
          $ref: '#/components/schemas/StackTrace'
        comparable:
          $ref: '#/components/schemas/Comparable'
        pattern:
          $ref: '#/components/schemas/Pattern'
        intValue:
          $ref: '#/components/schemas/int'
        doubleValue:
          $ref: '#/components/schemas/double'
        boolValue:
          $ref: '#/components/schemas/bool'
        numValue:
          $ref: '#/components/schemas/num'
        dynamicValue:
          $ref: '#/components/schemas/dynamic'

    GeneratedMethodCollider:
      type: object
      properties:
        fromJson:
          type: string
        toJson:
          type: string
        copyWith:
          type: string
        fromSimple:
          type: string
        toSimple:
          type: string
        fromForm:
          type: string
        toForm:
          type: string
        toLabel:
          type: string
        toMatrix:
          type: string
        toDeepObject:
          type: string
        currentEncodingShape:
          type: string
        parameterProperties:
          type: string
        uriEncode:
          type: string

