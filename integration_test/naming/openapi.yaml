      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimpleResult'
      responses:
        '200':
          description: OK

  /param-keyword-collision/{class}:
    post:
      operationId: createWithKeywordParams
      parameters:
        - name: class
          in: path
          required: true
          schema:
            type: string
        - name: return
          in: query
          schema:
            type: string
        - name: void
          in: query
