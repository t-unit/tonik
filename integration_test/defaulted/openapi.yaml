openapi: 3.0.4
info:
  title: Defaulted API
  description: >-
    Schema with `default` values for primitive, enum, and collection / free-form
    properties, plus operation parameter defaults across query, header, cookie,
    and path locations.
  version: 1.0.0
  contact:
    name: Example
    url: https://example.com
    email: example@example.com

servers:
  - url: https://api.example.com/v1

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
  /things:
    get:
      operationId: listThings
      summary: List things with defaulted parameters
      parameters:
        - name: region
          in: query
          schema:
            type: string
            default: "us"
        - name: page
          in: query
          required: true
          schema:
            type: integer
            default: 1
        - name: since
          in: query
          schema:
            type: string
            format: date-time
            default: "2024-01-01T00:00:00Z"
        - name: X-Retries
          in: header
          schema:
            type: integer
            default: 5
        - name: tracking
          in: cookie
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
  /things/{id}:
    get:
      operationId: getThing
      summary: Get a single thing with defaulted path parameter
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            default: "x"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
  /subscriptions:
    get:
      operationId: listSubscriptions
      summary: List subscriptions filtered by status
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/Status'
            default: active
        - name: X-Mode
          in: header
          schema:
            type: string
            enum: [auto, manual]
            default: auto
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subscription'

components:
  schemas:
    DefaultedPrimitives:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          default: "anon"
        count:
          type: integer
          default: 0
        rate:
          type: number
          format: double
          default: 1.5
        active:
          type: boolean
          default: true
        nickname:
          type: string
          nullable: true
          default: null
        title:
          type: string
          nullable: true
          default: "Mx."
    Status:
      type: string
      enum: [active, inactive, archived]
    Tier:
      type: integer
      enum: [1, 2, 3]
    Subscription:
      type: object
      properties:
        priority:
          type: string
          enum: [low, medium, high]
          default: medium
        level:
          type: integer
          enum: [1, 2, 3]
          default: 2
        status:
          $ref: '#/components/schemas/Status'
          default: active
        tier:
          $ref: '#/components/schemas/Tier'
          default: 2
        fallbackPriority:
          type: string
          enum: [low, medium, high]
          default: nonexistent
        startsAt:
          type: string
          format: date-time
          default: "2024-01-01T00:00:00Z"
        homepage:
          type: string
          format: uri
          default: "https://example.com"
        pricing:
          $ref: '#/components/schemas/Pricing'
          default:
            amount: "9.99"
            currency: "USD"
    Pricing:
      type: object
      required:
        - amount
        - currency
      properties:
        amount:
          type: string
          format: decimal
        currency:
          type: string
    Cat:
      type: object
      required:
        - kind
      properties:
        kind:
          type: string
        livesLeft:
          type: integer
    Dog:
      type: object
      required:
        - kind
      properties:
        kind:
          type: string
        goodBoy:
          type: boolean
    Pet:
      oneOf:
        - $ref: '#/components/schemas/Cat'
        - $ref: '#/components/schemas/Dog'
      discriminator:
        propertyName: kind
        mapping:
          cat: '#/components/schemas/Cat'
          dog: '#/components/schemas/Dog'
    Order:
      type: object
      properties:
        pet:
          $ref: '#/components/schemas/Pet'
          default:
            kind: cat
            livesLeft: 9
    Filters:
      type: object
      properties:
        tags:
          type: array
          items:
            type: string
          default: ["new", "featured"]
        counts:
          type: object
          additionalProperties:
            type: integer
          default:
            x: 1
            y: 2
        raw:
          type: object
          additionalProperties: true
          default:
            any: "value"
            nested: [1, 2, 3]
    BadlyDefaulted:
      type: object
      properties:
        when:
          type: string
          format: date-time
          default: "not a date"
    RwoDefaults:
      type: object
      properties:
        readOnlyTag:
          type: string
          readOnly: true
          default: "ro-tag"
        writeOnlyToken:
          type: string
          writeOnly: true
          default: "wo-token"
        plain:
          type: string
          default: "plain"
    RwoSchemaLevel:
      type: object
      readOnly: true
      properties:
        label:
          type: string
          default: "schema-ro"
        count:
          type: integer
          default: 42
    AliasC:
      type: string
      default: "c-default"
    AliasB:
      $ref: '#/components/schemas/AliasC'
    AliasA:
      $ref: '#/components/schemas/AliasB'
    AliasOuterWithDefault:
      $ref: '#/components/schemas/AliasC'
      default: "outer-default"
    AliasChainHolder:
      type: object
      properties:
        viaChain:
          $ref: '#/components/schemas/AliasA'
        viaOuter:
          $ref: '#/components/schemas/AliasOuterWithDefault'
    APTrueClass:
      type: object
      additionalProperties: true
      properties:
        name:
          type: string
    APTypedClass:
      type: object
      additionalProperties:
        type: integer
      properties:
        name:
          type: string
    APFalseClass:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
    APDefaults:
      type: object
      properties:
        anyExtras:
          $ref: '#/components/schemas/APTrueClass'
          default:
            name: "n"
            extraA: "value"
            extraB: 42
        typedExtras:
          $ref: '#/components/schemas/APTypedClass'
          default:
            name: "n"
            count: 7
        strictExtras:
          $ref: '#/components/schemas/APFalseClass'
          default:
            name: "n"
            ignored: "drop-me"
    AllOfBaseA:
      type: object
      properties:
        a:
          type: string
    AllOfBaseB:
      type: object
      properties:
        b:
          type: integer
    AllOfMerged:
      allOf:
        - $ref: '#/components/schemas/AllOfBaseA'
        - $ref: '#/components/schemas/AllOfBaseB'
    AllOfDefaultHolder:
      type: object
      properties:
        merged:
          $ref: '#/components/schemas/AllOfMerged'
          default:
            a: "a-val"
            b: 9
    OneOfShapeA:
      type: object
      required:
        - onlyA
      properties:
        onlyA:
          type: string
    OneOfShapeB:
      type: object
      required:
        - onlyB
      properties:
        onlyB:
          type: integer
    OneOfShapeShared:
      type: object
      required:
        - shared
      properties:
        shared:
          type: string
    OneOfShapeSharedAlt:
      type: object
      required:
        - shared
      properties:
        shared:
          type: string
        note:
          type: string
    OneOfNoDisc:
      oneOf:
        - $ref: '#/components/schemas/OneOfShapeA'
        - $ref: '#/components/schemas/OneOfShapeB'
    OneOfNoDiscAmbiguous:
      oneOf:
        - $ref: '#/components/schemas/OneOfShapeShared'
        - $ref: '#/components/schemas/OneOfShapeSharedAlt'
    OneOfNoDiscHolder:
      type: object
      properties:
        single:
          $ref: '#/components/schemas/OneOfNoDisc'
          default:
            onlyA: "from-default"
        ambiguous:
          $ref: '#/components/schemas/OneOfNoDiscAmbiguous'
          default:
            shared: "anywhere"
    OneOfRouteFirstOnly:
      type: object
      required:
        - intOnly
      properties:
        intOnly:
          type: integer
    OneOfRouteSecondOnly:
      type: object
      required:
        - flexible
      properties:
        flexible:
          type: string
    OneOfNoDiscRouted:
      oneOf:
        - $ref: '#/components/schemas/OneOfRouteFirstOnly'
        - $ref: '#/components/schemas/OneOfRouteSecondOnly'
    OneOfNoDiscRoutedHolder:
      type: object
      properties:
        routed:
          $ref: '#/components/schemas/OneOfNoDiscRouted'
          default:
            flexible: "matches-second"
    AnyOfShapeA:
      type: object
      properties:
        a:
          type: string
    AnyOfShapeB:
      type: object
      properties:
        b:
          type: integer
    AnyOfMulti:
      anyOf:
        - $ref: '#/components/schemas/AnyOfShapeA'
        - $ref: '#/components/schemas/AnyOfShapeB'
    AnyOfDefaultHolder:
      type: object
      properties:
        any:
          $ref: '#/components/schemas/AnyOfMulti'
          default:
            a: "a-val"
            b: 5
    Node:
      type: object
      properties:
        label:
          type: string
        next:
          $ref: '#/components/schemas/Node'
          default: {}
        nextOrNull:
          $ref: '#/components/schemas/Node'
          nullable: true
          default: null
    DirectDecimal:
      type: object
      properties:
        amount:
          type: string
          format: decimal
          default: "12.34"
    RequiredRuntimeDefault:
      type: object
      required:
        - startsAt
      properties:
        startsAt:
          type: string
          format: date-time
          default: "2024-01-01T00:00:00Z"
    BinaryDefaults:
      type: object
      properties:
        blob:
          type: string
          format: binary
          default: "AQID"
        encoded:
          type: string
          format: byte
          default: "SGVsbG8="
