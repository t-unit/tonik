openapi: 3.0.4
info:
  title: Defaulted API
  description: >-
    Schema with `default` values for primitive, enum, and collection / free-form
    properties, plus operation parameter defaults across query, header, cookie,
    and path locations.
  version: 1.0.0
  contact:
    name: Example
    url: https://example.com
    email: example@example.com

servers:
  - url: https://api.example.com/v1

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
  /things:
    get:
      operationId: listThings
      summary: List things with defaulted parameters
      parameters:
        - name: region
          in: query
          schema:
            type: string
            default: "us"
        - name: page
          in: query
          required: true
          schema:
            type: integer
            default: 1
        - name: X-Retries
          in: header
          schema:
            type: integer
            default: 5
        - name: tracking
          in: cookie
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
  /things/{id}:
    get:
      operationId: getThing
      summary: Get a single thing with defaulted path parameter
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            default: "x"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
  /subscriptions:
    get:
      operationId: listSubscriptions
      summary: List subscriptions filtered by status
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/Status'
            default: active
        - name: X-Mode
          in: header
          schema:
            type: string
            enum: [auto, manual]
            default: auto
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subscription'

components:
  schemas:
    DefaultedPrimitives:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          default: "anon"
        count:
          type: integer
          default: 0
        rate:
          type: number
          format: double
          default: 1.5
        active:
          type: boolean
          default: true
        nickname:
          type: string
          nullable: true
          default: null
        title:
          type: string
          nullable: true
          default: "Mx."
    Status:
      type: string
      enum: [active, inactive, archived]
    Tier:
      type: integer
      enum: [1, 2, 3]
    Subscription:
      type: object
      properties:
        priority:
          type: string
          enum: [low, medium, high]
          default: medium
        level:
          type: integer
          enum: [1, 2, 3]
          default: 2
        status:
          $ref: '#/components/schemas/Status'
          default: active
        tier:
          $ref: '#/components/schemas/Tier'
          default: 2
        fallbackPriority:
          type: string
          enum: [low, medium, high]
          default: nonexistent
        startsAt:
          type: string
          format: date-time
          default: "2024-01-01T00:00:00Z"
        homepage:
          type: string
          format: uri
          default: "https://example.com"
        pricing:
          $ref: '#/components/schemas/Pricing'
          default:
            amount: "9.99"
            currency: "USD"
    Pricing:
      type: object
      required:
        - amount
        - currency
      properties:
        amount:
          type: string
          format: decimal
        currency:
          type: string
    Cat:
      type: object
      required:
        - kind
      properties:
        kind:
          type: string
        livesLeft:
          type: integer
    Dog:
      type: object
      required:
        - kind
      properties:
        kind:
          type: string
        goodBoy:
          type: boolean
    Pet:
      oneOf:
        - $ref: '#/components/schemas/Cat'
        - $ref: '#/components/schemas/Dog'
      discriminator:
        propertyName: kind
        mapping:
          cat: '#/components/schemas/Cat'
          dog: '#/components/schemas/Dog'
    Order:
      type: object
      properties:
        pet:
          $ref: '#/components/schemas/Pet'
          default:
            kind: cat
            livesLeft: 9
    Filters:
      type: object
      properties:
        tags:
          type: array
          items:
            type: string
          default: ["new", "featured"]
        counts:
          type: object
          additionalProperties:
            type: integer
          default:
            x: 1
            y: 2
        raw:
          type: object
          additionalProperties: true
          default:
            any: "value"
            nested: [1, 2, 3]
    BadlyDefaulted:
      type: object
      properties:
        when:
          type: string
          format: date-time
          default: "not a date"
