openapi: 3.0.4
info:
  title: Form URL Encoded API
  description: OpenAPI specification testing application/x-www-form-urlencoded support
  version: 1.0.0
  contact:
    name: Example
    url: https://example.com
    email: example@example.com

servers:
  - url: http://localhost:8080

tags:
  - name: form
    description: Operations using form-urlencoded encoding
  - name: custom
    description: Operations with custom content type

paths:
  /form/simple:
    post:
      operationId: postSimpleForm
      tags:
        - form
      summary: Post simple flat object with form encoding
      description: Tests basic form encoding with flat object
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SimpleForm'
      responses:
        '200':
          description: Successful response
          content:
            application/x-www-form-urlencoded:
              schema:
                $ref: '#/components/schemas/SimpleForm'

  /form/special-chars:
    post:
      operationId: postSpecialChars
      tags:
        - form
      summary: Post form with special characters
      description: Tests encoding of special characters like &, =, +, spaces
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SpecialCharsForm'
      responses:
        '200':
          description: Successful response
          content:
            application/x-www-form-urlencoded:
              schema:
                $ref: '#/components/schemas/SpecialCharsForm'

  /form/echo-special-chars:
    post:
      operationId: postEchoSpecialChars
      tags:
        - form
      summary: Echo form with special characters
      description: True roundtrip test - echoes back the request body exactly as received
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SpecialCharsForm'
      responses:
        '200':
          description: Echo response with exact request body
          content:
            application/x-www-form-urlencoded:
              schema:
                $ref: '#/components/schemas/SpecialCharsForm'

  /form/echo-types:
    post:
      operationId: postEchoTypes
      tags:
        - form
      summary: Echo form with various types
      description: True roundtrip test - echoes back the request body exactly as received
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TypesForm'
      responses:
        '200':
          description: Echo response with exact request body
          content:
            application/x-www-form-urlencoded:
              schema:
                $ref: '#/components/schemas/TypesForm'

  /form/arrays:
    post:
      operationId: postArrayForm
      tags:
        - form
      summary: Post form with arrays
      description: Tests array encoding with explode=true (repeated keys)
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ArrayForm'
      responses:
        '200':
          description: Successful response
          content:
            application/x-www-form-urlencoded:
              schema:
                $ref: '#/components/schemas/ArrayForm'

  /form/types:
    post:
      operationId: postTypesForm
      tags:
        - form
      summary: Post form with various types
      description: Tests type conversions (strings, integers, booleans, dates)
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TypesForm'
      responses:
        '200':
          description: Successful response
          content:
            application/x-www-form-urlencoded:
              schema:
                $ref: '#/components/schemas/TypesForm'

  /form/response:
    get:
      operationId: getFormResponse
      tags:
        - form
      summary: Get response as form-urlencoded
      description: Tests response body deserialization of form-urlencoded
      responses:
        '200':
          description: Successful response with form-urlencoded body
          content:
            application/x-www-form-urlencoded:
              schema:
                $ref: '#/components/schemas/SimpleForm'

  /form/empty-null:
    post:
      operationId: postEmptyNull
      tags:
        - form
      summary: Post form with empty and null values
      description: Tests handling of empty strings and null values
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmptyNullForm'
      responses:
        '200':
          description: Successful response
          content:
            application/x-www-form-urlencoded:
              schema:
                $ref: '#/components/schemas/EmptyNullForm'

  /form/nested:
    post:
      operationId: postNestedForm
      tags:
        - form
      summary: Post form with nested object (should fail)
      description: Tests that nested objects throw runtime error
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NestedForm'
      responses:
        '200':
          description: Successful response
          content:
            application/x-www-form-urlencoded:
              schema:
                $ref: '#/components/schemas/NestedForm'

  /form/multi-content-request:
    post:
      operationId: postMultiContentRequest
      tags:
        - form
      summary: Post with both form and JSON content types
      description: Tests operation that accepts both application/x-www-form-urlencoded and application/json
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SimpleForm'
          application/json:
            schema:
              $ref: '#/components/schemas/SimpleForm'
      responses:
        '200':
          description: Successful response
          content:
            application/x-www-form-urlencoded:
              schema:
                $ref: '#/components/schemas/SimpleForm'
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleForm'

  /form/multi-content-response:
    get:
      operationId: getMultiContentResponse
      tags:
        - form
      summary: Get response with both form and JSON content types
      description: Tests operation that can return both application/x-www-form-urlencoded and application/json
      responses:
        '200':
          description: Successful response
          content:
            application/x-www-form-urlencoded:
              schema:
                $ref: '#/components/schemas/SimpleForm'
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleForm'

  /form/multi-content-both:
    post:
      operationId: postMultiContentBoth
      tags:
        - form
      summary: Post and receive with multiple content types
      description: Tests operation with multiple content types for both request and response
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TypesForm'
          application/json:
            schema:
              $ref: '#/components/schemas/TypesForm'
      responses:
        '200':
          description: Successful response
          content:
            application/x-www-form-urlencoded:
              schema:
                $ref: '#/components/schemas/TypesForm'
            application/json:
              schema:
                $ref: '#/components/schemas/TypesForm'

  /form/scalar:
    post:
      operationId: postScalarForm
      tags:
        - form
      summary: Post a top-level primitive form-urlencoded body
      description: Tests that a scalar body encodes as a bare value with no leading equals sign
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: string
      responses:
        '200':
          description: Successful response
          content:
            application/x-www-form-urlencoded:
              schema:
                type: string

  /form/allow-reserved:
    post:
      operationId: postAllowReservedForm
      tags:
        - form
      summary: Post form where one property opts into allowReserved
      description: >-
        Tests that a body property flagged allowReserved keeps reserved
        characters literal in the sent body, while a sibling property without
        the flag is fully percent-encoded.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AllowReservedForm'
            encoding:
              reserved:
                allowReserved: true
              notReserved:
                allowReserved: false
      responses:
        '200':
          description: Echo response with exact request body
          content:
            application/x-www-form-urlencoded:
              schema:
                $ref: '#/components/schemas/AllowReservedForm'

  /form/allow-reserved-mixed:
    post:
      operationId: postAllowReservedMixedForm
      tags:
        - form
      summary: Post form where an allowReserved scalar sits beside a write-only
        sibling
      description: >-
        Tests that a flagged allowReserved scalar keeps reserved characters
        literal while a write-only sibling (nullable field, null-guarded) is
        still emitted on the per-property path.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AllowReservedMixedForm'
            encoding:
              reserved:
                allowReserved: true
      responses:
        '200':
          description: Echo response with exact request body
          content:
            application/x-www-form-urlencoded:
              schema:
                $ref: '#/components/schemas/AllowReservedMixedForm'

  /form/allow-reserved-collision:
    post:
      operationId: postAllowReservedCollisionForm
      tags:
        - form
      summary: Post form where a read-only sibling forces a write property onto a
        suffixed field name
      description: >-
        Tests that a write property whose normalized name collides with a
        read-only sibling references the suffixed field the object path assigns
        it when the per-property allowReserved path activates.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AllowReservedCollisionForm'
            encoding:
              user_name:
                allowReserved: true
      responses:
        '200':
          description: Echo response with exact request body
          content:
            application/x-www-form-urlencoded:
              schema:
                $ref: '#/components/schemas/AllowReservedCollisionForm'

  /form/allow-reserved-array:
    post:
      operationId: postAllowReservedArrayForm
      tags:
        - form
      summary: Post form where a flagged scalar sits beside an array property
      description: >-
        Tests that an array sibling of a flagged allowReserved scalar is
        comma-joined into a single entry, matching the object path, rather than
        exploded into repeated keys.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AllowReservedArrayForm'
            encoding:
              reserved:
                allowReserved: true
      responses:
        '200':
          description: Echo response with exact request body
          content:
            application/x-www-form-urlencoded:
              schema:
                $ref: '#/components/schemas/AllowReservedArrayForm'

  /custom/form:
    post:
      operationId: postCustomForm
      tags:
        - custom
      summary: Post with custom content type mapped to form encoding
      description: Tests contentTypeOverrides config with application/vnd.custom-form (returns JSON since Imposter doesn't support custom form responses)
      requestBody:
        required: true
        content:
          application/vnd.custom-form:
            schema:
              $ref: '#/components/schemas/CustomForm'
      responses:
        '200':
          description: Successful response
          content:
            application/vnd.custom-form:
              schema:
                $ref: '#/components/schemas/CustomForm'

components:
  schemas:
    SimpleForm:
      type: object
      required:
        - name
        - age
      properties:
        name:
          type: string
          description: Person name
          example: John Doe
        age:
          type: integer
          description: Person age
          example: 30

    SpecialCharsForm:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          description: Text with special characters
          example: a&b=c+d
        url:
          type: string
          description: URL with special characters
          example: 50% off! Buy now & save $$$

    ArrayForm:
      type: object
      required:
        - colors
      properties:
        colors:
          type: array
          items:
            type: string
          description: Array of color names
          example: [red, green, blue]
        numbers:
          type: array
          items:
            type: integer
          description: Array of numbers
          example: [1, 2, 3]

    TypesForm:
      type: object
      required:
        - stringValue
        - intValue
        - boolValue
      properties:
        stringValue:
          type: string
          description: String value
          example: hello
        intValue:
          type: integer
          description: Integer value
          example: 42
        doubleValue:
          type: number
          format: double
          description: Double value
          example: 3.14
        boolValue:
          type: boolean
          description: Boolean value
          example: true
        dateValue:
          type: string
          format: date-time
          description: DateTime value
          example: 2023-12-25T10:30:00Z

    EmptyNullForm:
      type: object
      properties:
        emptyString:
          type: string
          description: Empty string value
          example: ""
        nullableString:
          type: string
          nullable: true
          description: Nullable string that may be null
          example: not empty

    NestedForm:
      type: object
      required:
        - topLevel
        - nested
      properties:
        topLevel:
          type: string
          description: Top level property
        nested:
          type: object
          description: Nested object (not supported in form encoding)
          properties:
            innerProp:
              type: string

    CustomForm:
      type: object
      required:
        - field1
        - field2
      properties:
        field1:
          type: string
          example: custom value
        field2:
          type: integer
          example: 100

    AllowReservedForm:
      type: object
      required:
        - reserved
        - notReserved
      properties:
        reserved:
          type: string
          description: Value that keeps reserved characters literal
        notReserved:
          type: string
          description: Value that is fully percent-encoded

    AllowReservedMixedForm:
      type: object
      required:
        - reserved
        - secret
      properties:
        reserved:
          type: string
          description: Value that keeps reserved characters literal
        secret:
          type: string
          writeOnly: true
          description: Write-only field, nullable in the client and null-guarded

    AllowReservedCollisionForm:
      type: object
      required:
        - user_name
      properties:
        user-name:
          type: string
          readOnly: true
          description: Read-only sibling that normalizes to the same Dart field name
        user_name:
          type: string
          description: Write property that must reference its suffixed field name

    AllowReservedArrayForm:
      type: object
      required:
        - reserved
        - tags
      properties:
        reserved:
          type: string
          description: Value that keeps reserved characters literal
        tags:
          type: array
          items:
            type: string
          description: Array sibling comma-joined into a single entry
