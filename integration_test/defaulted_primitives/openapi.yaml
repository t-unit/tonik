openapi: 3.0.4
info:
  title: Defaulted Primitives API
  description: >-
    Schema with `default` values for primitive properties.
  version: 1.0.0
  contact:
    name: Example
    url: https://example.com
    email: example@example.com

servers:
  - url: https://api.example.com/v1

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
  /things:
    get:
      operationId: listThings
      summary: List things with defaulted parameters
      parameters:
        - name: region
          in: query
          schema:
            type: string
            default: "us"
        - name: page
          in: query
          required: true
          schema:
            type: integer
            default: 1
        - name: X-Retries
          in: header
          schema:
            type: integer
            default: 5
        - name: tracking
          in: cookie
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
  /things/{id}:
    get:
      operationId: getThing
      summary: Get a single thing with defaulted path parameter
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            default: "x"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string

components:
  schemas:
    DefaultedPrimitives:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          default: "anon"
        count:
          type: integer
          default: 0
        rate:
          type: number
          format: double
          default: 1.5
        active:
          type: boolean
          default: true
        nickname:
          type: string
          nullable: true
          default: null
        title:
          type: string
          nullable: true
          default: "Mx."
