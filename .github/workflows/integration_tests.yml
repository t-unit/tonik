name: Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  generate-integration:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            sdk: stable
          - os: macos-latest
            sdk: stable
          - os: windows-latest
            sdk: stable
          - os: ubuntu-latest
            sdk: beta

    steps:
      - uses: actions/checkout@v7

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}

      - name: Cache Dart pub dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.pub-cache
            ${{ github.workspace }}/.dart_tool
          key: ${{ runner.os }}-dart-${{ matrix.sdk }}-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-dart-${{ matrix.sdk }}-
            ${{ runner.os }}-dart-

      - name: Cache Imposter JAR
        uses: actions/cache@v6
        with:
          path: integration_test/imposter.jar
          key: imposter-4.6.8
          restore-keys: imposter-

      - name: Install dependencies
        run: |
          dart pub global activate melos
          melos bootstrap

      - name: Generate integration test code
        run: ./scripts/setup_integration_tests.sh
        shell: bash

      - name: Archive generated code
        shell: bash
        run: |
          tar -czf generated-integration-code.tar.gz \
            $(find integration_test -type d -name '*_api' -print)

      - name: Upload generated code
        uses: actions/upload-artifact@v7
        with:
          name: generated-integration-code-${{ matrix.os }}-${{ matrix.sdk }}
          path: generated-integration-code.tar.gz
          compression-level: 0
          retention-days: 1

      - name: Upload Imposter JAR
        uses: actions/upload-artifact@v7
        with:
          name: imposter-jar-${{ matrix.os }}-${{ matrix.sdk }}
          path: integration_test/imposter.jar
          compression-level: 0
          retention-days: 1

  analyze-generated:
    needs: generate-integration
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2]

    steps:
      - uses: actions/checkout@v7

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Download generated code
        uses: actions/download-artifact@v8
        with:
          name: generated-integration-code-ubuntu-latest-stable

      - name: Extract generated code
        run: tar -xzf generated-integration-code.tar.gz

      - name: Analyze generated code
        run: |
          find integration_test -name pubspec.yaml -print |
            sort |
            awk -v shard=${{ matrix.shard }} \
              '(NR - 1) % 3 == shard' |
            xargs -n 1 -P 2 bash -c \
              'cd "$(dirname "$1")" && dart pub get && dart analyze --fatal-infos --fatal-warnings' _

  test:
    needs: generate-integration
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        sdk: [stable]
        shard: [0, 1, 2]
        include:
          - os: ubuntu-latest
            sdk: beta
            shard: 0
          - os: ubuntu-latest
            sdk: beta
            shard: 1
          - os: ubuntu-latest
            sdk: beta
            shard: 2

    steps:
      - uses: actions/checkout@v7

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}

      - name: Download generated code
        uses: actions/download-artifact@v8
        with:
          name: generated-integration-code-${{ matrix.os }}-${{ matrix.sdk }}

      - name: Extract generated code
        run: tar -xzf generated-integration-code.tar.gz
        shell: bash

      - name: Download Imposter JAR
        uses: actions/download-artifact@v8
        with:
          name: imposter-jar-${{ matrix.os }}-${{ matrix.sdk }}
          path: integration_test

      - name: Cache Dart pub dependencies
        uses: actions/cache@v6
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-dart-${{ matrix.sdk }}-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-dart-${{ matrix.sdk }}-
            ${{ runner.os }}-dart-

      - name: Run integration tests
        shell: bash
        run: |
          tests=$(find integration_test -path '*_test/test/*_test.dart' -print |
            sort |
            awk -v shard=${{ matrix.shard }} \
              '(NR - 1) % 3 == shard')

          printf '%s\n' "$tests" |
            sed 's#/test/.*#/pubspec.yaml#' |
            sort -u |
            xargs -n 1 -P 2 bash -c \
              'cd "$(dirname "$1")" && dart pub get' _

          printf '%s\n' "$tests" |
            xargs -n 1 -P 2 bash -c \
              'package="${1%%/test/*}"; cd "$package" && dart test "${1#"$package"/}"' _
